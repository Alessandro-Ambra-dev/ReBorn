<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bgGradient" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#4FDA8C" />
            <stop offset="100%" stop-color="#2DBAD8" />
        </linearGradient>
        <filter id="innerShadow" x="-50%" y="-50%" width="200%" height="200%">
            <feComponentTransfer in="SourceAlpha">
                <feFuncA type="table" tableValues="1 0" />
            </feComponentTransfer>
            <feGaussianBlur stdDeviation="10" />
            <feOffset dx="5" dy="5" result="offsetblur" />
            <feFlood flood-color="rgb(0, 0, 0)" flood-opacity="0.2" />
            <feComposite in2="offsetblur" operator="in" />
            <feComposite in2="SourceAlpha" operator="in" />
            <feMerge>
                <feMergeNode in="SourceGraphic" />
                <feMergeNode />
            </feMerge>
        </filter>
    </defs>

    <rect x="32" y="32" width="448" height="448" rx="110" fill="url(#bgGradient)" />

    <g filter="url(#innerShadow)" fill="#FFFFFF">
        <path d="M256 380C256 380 150 360 120 250C98.5 171.5 155 110 155 110C155 110 180 180 256 210" />
        <path d="M256 210C256 210 230 140 256 80C256 80 300 120 310 170" opacity="0.8"/>
        
        <rect x="340" y="140" width="40" height="100" rx="10" transform="rotate(-30 340 140)" />
        <rect x="230" y="330" width="40" height="100" rx="10" transform="rotate(-30 230 330)" />
        <rect x="260" y="215" width="160" height="30" rx="15" transform="rotate(-30 260 215)" />
    </g>
</svg>